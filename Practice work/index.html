<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Grid Example</title>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-2xl font-bold mb-6">Grid layout Example</h1>
    <!-- Grid container -->

    <div class="grid grid-cols-3 gap-4">
        <div class="bg-blue-500 text-white p-4 rounded">
            Card 1
        </div>
        <div class="bg-green-500 text-white p-4 rounded">
            Card 2
        </div>
        <div class="bg-purple-500 text-white p-4 rounded">
            Card 3
        </div>
        <div class="bg-red-500 text-white p-4 rounded">
            Card 4
        </div>
        <div class="bg-yellow-500 text-white p-4 rounded">
            Card 5
        </div>
        <div class="bg-pink-500 text-white p-4 rounded">
            Card 6
        </div>

    
</body>
</html>
